name: ila-coding

services:
  backend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      DB_PATH: /app/data/coding_assistant.db
    ports:
      - "8001:8000"
    volumes:
      - db_data:/app/data
      - backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    profiles: ["prod"]
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    profiles: ["prod"]
    image: grafana/grafana:11.2.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  backend-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: development
      HOST: 0.0.0.0
      PORT: 8000
      DB_PATH: /app/data/coding_assistant.db
      DEV_EXPOSE_OTP: "true"
    ports:
      - "8001:8000"
    volumes:
      - ./:/app
      - db_data:/app/data
      - backups:/app/backups
    command: ["python3", "-m", "src.main"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8001/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend-dev:
        condition: service_healthy
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  db_data:
  backups:
  frontend_node_modules:
  grafana_data:
