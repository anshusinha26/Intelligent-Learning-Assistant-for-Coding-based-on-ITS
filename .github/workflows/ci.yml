name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage bandit pip-audit

      - name: Lint
        run: python -m compileall src tests scripts

      - name: Formatting
        run: python scripts/check_formatting.py

      - name: Backend tests with coverage
        run: |
          coverage run -m unittest discover -s tests -p 'test_*.py' -v
          coverage xml -o coverage.xml
          coverage report -m

      - name: Problem bank validators
        run: |
          python problem_validator.py --output-dir reports/phase3
          python metadata_validator.py --output-dir reports/phase3
          python curriculum_validator.py --output-dir reports/phase3
          python solution_validator.py --output-dir reports/phase3
          python testcase_validator.py --output-dir reports/phase3

      - name: Security scan
        run: bandit -r src -x tests

      - name: Dependency audit (Python)
        run: pip-audit -r requirements.txt

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend build
        run: npm run build

      - name: Dependency audit (Node)
        run: npm audit --audit-level=high

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker-and-compose:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build backend
        run: docker build -t ila-backend:ci -f Dockerfile --target production .

      - name: Docker build frontend
        run: docker build -t ila-frontend:ci -f frontend/Dockerfile --target production frontend

      - name: Compose config (dev)
        run: docker compose --profile dev config

      - name: Compose config (prod)
        run: docker compose --profile prod config
